# This GitHub Action automates the process of building Grafana plugins.
# (For more information, see https://github.com/grafana/plugin-actions/blob/main/build-plugin/README.md)
#
# On PRs:  builds + validates with plugin-validator-pr.yaml (skips analyzers
#          that need a signed/published artifact).
# On tags: builds, tests, signs, validates with the full analyzer suite, and
#          publishes a GitHub Release.
name: Release Plugin

on:
    push:
        tags:
            - "nominal-grafana-plugin@*" # Run on release-please tags, e.g. nominal-grafana-plugin@0.0.14
    pull_request:
        branches:
            - main

permissions:
    contents: read

jobs:
    # Build-only job for PRs - verifies plugin compiles correctly
    build:
        if: github.event_name == 'pull_request'
        permissions:
            contents: read
        runs-on: depot-ubuntu-24.04-8
        steps:
            - name: Checkout
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

            - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
              with:
                  package_json_file: package.json

            - name: Setup Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: "22"
                  cache: pnpm
                  cache-dependency-path: package.json

            - name: Install dependencies
              run: pnpm install --frozen-lockfile --prefer-offline

            - name: Build frontend
              run: pnpm run build

            - name: Setup Go
              uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
              with:
                  go-version: "1.26.3"
                  cache: true
                  cache-dependency-path: go.sum

            - name: Build backend
              uses: magefile/mage-action@6f50bbb8ea47d56e62dee92392788acbc8192d0b # v3.1.0
              with:
                  version: latest
                  args: buildAll
                  workdir: .

            - name: Package plugin
              id: package-plugin
              run: |
                  PLUGIN_ID="$(node -p "require('./dist/plugin.json').id")"
                  PLUGIN_VERSION="$(node -p "require('./dist/plugin.json').info.version")"
                  PLUGIN_ARCHIVE="${PLUGIN_ID}-${PLUGIN_VERSION}.zip"

                  echo "archive=${PLUGIN_ARCHIVE}" >> $GITHUB_OUTPUT

                  mv dist "${PLUGIN_ID}"
                  zip -r "${PLUGIN_ARCHIVE}" "${PLUGIN_ID}"

            - name: Validate plugin (PR)
              # Relaxed config — release-only analyzers (signature, manifest,
              # provenance, checksum, version) are disabled here and run in
              # the release job below. Upstream Docker image for parity with
              # Grafana's review service; pin by digest if you need
              # reproducibility.
              env:
                  PLUGIN_ARCHIVE: ${{ steps.package-plugin.outputs.archive }}
              run: |
                  docker run --pull=always --rm \
                    -v "$PWD/$PLUGIN_ARCHIVE:/archive.zip:ro" \
                    -v "$PWD/.github/plugin-validator-pr.yaml:/config.yaml:ro" \
                    -v "$PWD:/src:ro" \
                    grafana/plugin-validator-cli \
                    -config /config.yaml \
                    -sourceCodeUri file:///src \
                    /archive.zip

            - name: Build summary
              run: |
                  echo "## Plugin Build Summary" >> $GITHUB_STEP_SUMMARY
                  echo "- Build: Completed successfully" >> $GITHUB_STEP_SUMMARY
                  echo "- Plugin ID: nominal-nominalds-datasource" >> $GITHUB_STEP_SUMMARY

    # Full release job for tags - builds and creates GitHub Release
    release:
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        permissions:
            contents: write
            id-token: write
            attestations: write
        runs-on: depot-ubuntu-24.04-8
        env:
            GRAFANA_PLUGIN_ACCESS_KEY: ${{ secrets.GRAFANA_PLUGIN_ACCESS_KEY }}
        steps:
            - name: Checkout
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

            - name: Extract version from tag
              id: extract-version
              run: |
                  # Tag format: nominal-grafana-plugin@X.Y.Z
                  TAG="${GITHUB_REF#refs/tags/}"
                  VERSION="${TAG#*@}"
                  echo "version=${VERSION}" >> $GITHUB_OUTPUT
                  echo "tag=${TAG}" >> $GITHUB_OUTPUT
                  echo "Extracted version: ${VERSION} from tag: ${TAG}"

            - name: Check public signing secret
              run: |
                  if [ -z "$GRAFANA_PLUGIN_ACCESS_KEY" ]; then
                    echo "::error::Missing GRAFANA_PLUGIN_ACCESS_KEY. Public plugin releases need a Grafana access policy token."
                    exit 1
                  fi

            - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
              with:
                  package_json_file: package.json

            - name: Setup Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: "22"
                  cache: pnpm
                  cache-dependency-path: package.json

            - name: Install dependencies
              run: pnpm install --frozen-lockfile --prefer-offline

            - name: Build frontend
              run: pnpm run build

            - name: Setup Go
              uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
              with:
                  go-version: "1.26.3"
                  cache: true
                  cache-dependency-path: go.sum

            - name: Test backend
              uses: magefile/mage-action@6f50bbb8ea47d56e62dee92392788acbc8192d0b # v3.1.0
              with:
                  version: latest
                  args: test
                  workdir: .

            - name: Build backend
              uses: magefile/mage-action@6f50bbb8ea47d56e62dee92392788acbc8192d0b # v3.1.0
              with:
                  version: latest
                  args: buildAll
                  workdir: .

            - name: Sign plugin
              env:
                  GRAFANA_ACCESS_POLICY_TOKEN: ${{ env.GRAFANA_PLUGIN_ACCESS_KEY }}
              run: pnpm run sign

            - name: Package plugin
              id: package-plugin
              run: |
                  PLUGIN_ID="$(node -p "require('./dist/plugin.json').id")"
                  PLUGIN_VERSION="$(node -p "require('./dist/plugin.json').info.version")"
                  PLUGIN_ARCHIVE="${PLUGIN_ID}-${PLUGIN_VERSION}.zip"
                  PLUGIN_ARCHIVE_SHA1SUM="${PLUGIN_ARCHIVE}.sha1"

                  echo "plugin-id=${PLUGIN_ID}" >> $GITHUB_OUTPUT
                  echo "plugin-version=${PLUGIN_VERSION}" >> $GITHUB_OUTPUT
                  echo "archive=${PLUGIN_ARCHIVE}" >> $GITHUB_OUTPUT
                  echo "archive-sha1sum=${PLUGIN_ARCHIVE_SHA1SUM}" >> $GITHUB_OUTPUT

                  mv dist "${PLUGIN_ID}"
                  zip -r "${PLUGIN_ARCHIVE}" "${PLUGIN_ID}"
                  sha1sum "${PLUGIN_ARCHIVE}" | cut -f1 -d' ' > "${PLUGIN_ARCHIVE_SHA1SUM}"

            - name: Attest plugin provenance
              # Mirror grafana/plugin-actions/build-plugin's attestation action for plugin review parity.
              uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.0.0
              with:
                  subject-path: ${{ steps.package-plugin.outputs.archive }}

            - name: Validate plugin (release)
              # No -config: runs the full analyzer suite, including the
              # signature/manifest/provenance/checksum/version checks that the
              # PR job skips (the archive has just been signed above).
              env:
                  PLUGIN_ARCHIVE: ${{ steps.package-plugin.outputs.archive }}
              run: |
                  docker run --pull=always --rm \
                    -v "$PWD/$PLUGIN_ARCHIVE:/archive.zip:ro" \
                    -v "$PWD:/src:ro" \
                    grafana/plugin-validator-cli \
                    -sourceCodeUri file:///src \
                    /archive.zip

            - name: Show package outputs
              run: |
                  echo "Plugin ID: ${{ steps.package-plugin.outputs.plugin-id }}"
                  echo "Plugin Version: ${{ steps.package-plugin.outputs.plugin-version }}"
                  echo "Archive: ${{ steps.package-plugin.outputs.archive }}"
                  echo "Archive SHA1: ${{ steps.package-plugin.outputs.archive-sha1sum }}"
                  ls -la ${{ steps.package-plugin.outputs.archive }}*

            - name: Create release notes
              run: |
                  # Extract release notes from CHANGELOG for this version
                  VERSION="${{ steps.extract-version.outputs.version }}"
                  awk "/^## \[?${VERSION}/ {found=1; next} /^## / {if(found) exit} found {print}" CHANGELOG.md > release_notes.md
                  if [ ! -s release_notes.md ]; then
                    echo "Release ${VERSION}" > release_notes.md
                  fi

            - name: Create GitHub Release
              uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
              with:
                  tag_name: ${{ steps.extract-version.outputs.tag }}
                  name: v${{ steps.extract-version.outputs.version }}
                  body_path: release_notes.md
                  files: |
                      ${{ steps.package-plugin.outputs.archive }}
                      ${{ steps.package-plugin.outputs.archive-sha1sum }}
